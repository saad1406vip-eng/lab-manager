<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0d1b2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lab Manager">
<link rel="manifest" href="manifest.json">
<title>Lab Manager Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-area">
      <span class="logo-icon">⬡</span>
      <div>
        <h1>Lab Manager Pro</h1>
        <p class="subtitle">نظام تحليل تغطية الأجهزة</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-icon" onclick="resetAll()" title="إعادة ضبط">↺</button>
    </div>
  </div>
</header>

<main>
  <!-- Quick Coverage Dashboard -->
  <section class="dashboard" id="dashboard">
    <div class="dash-title">التغطية الحالية</div>
    <div class="coverage-bars" id="coverageBars"></div>
  </section>

  <!-- Device Tabs -->
  <section class="devices-section">
    <div class="tab-nav" id="tabNav"></div>
    <div id="tabsContainer"></div>
  </section>

  <!-- Analysis Section -->
  <section class="analysis-section">
    <div class="section-title">🔍 التحليل الذكي</div>
    <div class="action-row">
      <button class="btn-primary" onclick="analyze()">تحليل الوضع</button>
      <button class="btn-secondary" onclick="generateReport()">تقرير كامل</button>
      <button class="btn-secondary" onclick="copyReport()">نسخ التقرير</button>
    </div>
    <div id="resultWrapper" style="display:none">
      <pre id="result"></pre>
    </div>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
