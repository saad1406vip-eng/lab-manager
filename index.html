<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0d1b2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lab Manager">
<title>Lab Manager Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1b2a;--bg2:#112236;--bg3:#162d46;--card:#1a3352;--border:#1e3f63;
  --accent:#00c8ff;--accent2:#00ff9d;--no:#ff6b6b;--warn:#ffe066;--orange:#ff8c42;
  --text:#e8f4fd;--text2:#7aa8cc;--text3:#4a7a9b;
  --font:'IBM Plex Sans Arabic',sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:10px;--radius-sm:6px;--nav-h:60px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;font-size:14px;overflow-x:hidden;padding-bottom:var(--nav-h);}
header{background:linear-gradient(135deg,var(--bg2),var(--bg3));border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.header-inner{max-width:820px;margin:0 auto;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;}
.logo-area{display:flex;align-items:center;gap:10px;}
.logo-icon{font-size:22px;color:var(--accent);filter:drop-shadow(0 0 6px var(--accent));}
h1{font-size:15px;font-weight:700;}
.subtitle{font-size:10px;color:var(--text3);}
.alert-badge{background:var(--no);color:#fff;border-radius:12px;padding:3px 9px;font-size:11px;font-weight:700;cursor:pointer;display:none;}
.alert-badge.show{display:block;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:200;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--text3);cursor:pointer;font-family:var(--font);font-size:10px;transition:all 0.2s;}
.nav-btn .nav-icon{font-size:20px;}
.nav-btn.active{color:var(--accent);}
.nav-btn.active .nav-icon{filter:drop-shadow(0 0 6px var(--accent));}
.page{display:none;max-width:820px;margin:0 auto;padding:14px;flex-direction:column;gap:12px;}
.page.active{display:flex;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:13px;}
.card-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:11px;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px;text-align:center;}
.stat-num{font-size:22px;font-weight:700;font-family:var(--mono);}
.stat-num.red{color:var(--no);}
.stat-num.yellow{color:var(--warn);}
.stat-num.orange{color:var(--orange);}
.stat-label{font-size:10px;color:var(--text3);margin-top:2px;}
.alert-row{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--radius-sm);margin-bottom:5px;}
.alert-row.red{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);}
.alert-row.yellow{background:rgba(255,224,102,0.08);border:1px solid rgba(255,224,102,0.35);}
.alert-row.orange{background:rgba(255,140,66,0.08);border:1px solid rgba(255,140,66,0.3);}
.alert-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dot-red{background:var(--no);}
.dot-yellow{background:var(--warn);}
.dot-orange{background:var(--orange);}
.alert-text{flex:1;font-size:12px;line-height:1.4;}
.alert-sub{font-size:10px;color:var(--text3);font-family:var(--mono);}
.coverage-row{display:grid;grid-template-columns:105px 1fr 44px;align-items:center;gap:7px;margin-bottom:6px;}
.cov-label{font-size:11px;color:var(--text2);font-family:var(--mono);white-space:nowrap;}
.cov-track{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;}
.cov-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width 0.5s;}
.cov-pct{font-size:10px;font-family:var(--mono);color:var(--accent);}
.home-tabs-nav{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--bg2);border-radius:var(--radius) var(--radius) 0 0;}
.home-tabs-nav::-webkit-scrollbar{display:none;}
.home-tab-btn{flex-shrink:0;background:none;border:none;color:var(--text3);padding:10px 13px;cursor:pointer;font-family:var(--font);font-size:11px;font-weight:600;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s;font-family:var(--mono);}
.home-tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(0,200,255,0.05);}
.home-tab-content{display:none;padding:12px;}
.home-tab-content.active{display:block;}
.section-header{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:8px 0 5px;border-bottom:1px solid var(--border);margin-bottom:5px;margin-top:12px;}
.section-header:first-of-type{margin-top:0;}
.reagent-list{display:flex;flex-direction:column;gap:5px;}
.reagent-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;cursor:pointer;transition:border-color 0.15s;}
.reagent-item.status-red{border-color:rgba(255,107,107,0.5);background:rgba(255,107,107,0.06);}
.reagent-item.status-yellow{border-color:rgba(255,224,102,0.4);background:rgba(255,224,102,0.04);}
.reagent-item.status-orange{border-color:rgba(255,140,66,0.4);background:rgba(255,140,66,0.04);}
.reagent-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;}
.reagent-name{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text);}
.reagent-type{font-size:9px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px;}
.status-pill{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.pill-ok{background:rgba(0,255,157,0.15);color:var(--accent2);}
.pill-red{background:rgba(255,107,107,0.2);color:var(--no);}
.pill-yellow{background:rgba(255,224,102,0.2);color:#b8940a;}
.pill-orange{background:rgba(255,140,66,0.2);color:var(--orange);}
.kit-progress{margin-bottom:6px;}
.kit-progress-label{display:flex;justify-content:space-between;margin-bottom:3px;}
.kpl-text{font-size:9px;color:var(--text3);}
.kpl-days{font-size:10px;font-family:var(--mono);font-weight:700;}
.kpl-days.green{color:var(--accent2);}
.kpl-days.yellow{color:var(--warn);}
.kpl-days.red{color:var(--no);}
.kit-bar-track{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;}
.kit-bar-fill{height:100%;border-radius:2px;transition:width 0.5s;}
.kit-bar-fill.green{background:var(--accent2);}
.kit-bar-fill.yellow{background:var(--warn);}
.kit-bar-fill.red{background:var(--no);}
.reagent-meta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;}
.meta-field{display:flex;flex-direction:column;gap:1px;}
.meta-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;}
.meta-val{font-size:11px;color:var(--text2);font-family:var(--mono);}
.tab-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.tab-dev-title{font-size:12px;font-weight:700;color:var(--text);}
.tab-dev-count{font-size:10px;font-family:var(--mono);color:var(--text3);}
.tab-dev-count span{color:var(--accent2);font-weight:700;}
.tab-nav-dev{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none;background:var(--bg2);}
.tab-nav-dev::-webkit-scrollbar{display:none;}
.tab-btn-dev{flex-shrink:0;background:none;border:none;color:var(--text3);padding:10px 13px;cursor:pointer;font-family:var(--mono);font-size:11px;font-weight:500;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s;}
.tab-btn-dev.active{color:var(--accent);border-bottom-color:var(--accent);}
.device-tab-content{display:none;padding:12px;}
.device-tab-content.active{display:block;}
.type-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;margin-bottom:7px;}
.badge-chem{background:rgba(0,200,255,0.15);color:var(--accent);}
.badge-hormone{background:rgba(0,255,157,0.15);color:var(--accent2);}
.badge-both{background:rgba(255,165,0,0.15);color:#ffaa00;}
.badge-emergency{background:rgba(255,107,107,0.15);color:var(--no);}
.cat-header{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:7px 0 4px;border-bottom:1px solid var(--border);margin-bottom:4px;margin-top:9px;}
.tests-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:4px;}
.test-item{display:flex;align-items:center;justify-content:space-between;padding:6px 9px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
.test-item.available{border-color:rgba(0,255,157,0.3);background:rgba(0,255,157,0.05);}
.test-item.unavailable{border-color:rgba(255,107,107,0.15);opacity:0.55;}
.test-name{font-family:var(--mono);font-size:11px;font-weight:600;}
.test-badge{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:700;}
.test-item.available .test-badge{background:rgba(0,255,157,0.15);color:var(--accent2);}
.test-item.unavailable .test-badge{background:rgba(255,107,107,0.15);color:var(--no);}
.bulk-actions{display:flex;gap:6px;margin-bottom:9px;}
.btn-bulk{background:var(--bg2);border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font);font-size:10px;}
.btn-primary{background:linear-gradient(135deg,var(--accent),#0095cc);border:none;color:#000;padding:10px 18px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:700;}
.btn-secondary{background:var(--bg2);border:1px solid var(--border);color:var(--text2);padding:10px 14px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font);font-size:12px;}
.btn-sm{background:var(--bg2);border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font);font-size:11px;}
.result-box{margin-top:11px;border-top:1px solid var(--border);padding-top:11px;display:none;}
pre#result{font-family:var(--font);font-size:12px;line-height:1.8;color:var(--text);white-space:pre-wrap;word-break:break-word;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:18px;width:100%;max-width:620px;max-height:92vh;overflow-y:auto;}
.modal-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;}
.form-group{margin-bottom:11px;}
.form-label{font-size:11px;color:var(--text3);margin-bottom:4px;display:block;}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 11px;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;outline:none;}
.form-input:focus{border-color:var(--accent);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.section-divider{border:none;border-top:1px solid var(--border);margin:12px 0;}
.modal-section-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;}
.btn-save{width:100%;background:linear-gradient(135deg,var(--accent),#0095cc);border:none;color:#000;padding:11px;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;margin-top:7px;}
.btn-delete{width:100%;background:rgba(255,107,107,0.12);border:1px solid rgba(255,107,107,0.3);color:var(--no);padding:9px;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;cursor:pointer;margin-top:5px;}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(60px);opacity:0;background:var(--accent2);color:#000;padding:9px 18px;border-radius:20px;font-weight:700;font-size:12px;z-index:999;transition:transform 0.3s,opacity 0.3s;pointer-events:none;}
@media(max-width:480px){.tests-grid{grid-template-columns:repeat(2,1fr);}.reagent-meta{grid-template-columns:1fr 1fr;}}
::-webkit-scrollbar{width:3px;height:3px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo-area">
      <span class="logo-icon">⬡</span>
      <div><h1>Lab Manager Pro</h1><p class="subtitle">نظام إدارة المختبر المتكامل</p></div>
    </div>
    <span class="alert-badge" id="globalAlertBadge"></span>
  </div>
</header>

<!-- صفحات المشروع -->
<div class="page active" id="page-home">
  <!-- محتوى المشروع الأصلي هنا -->
  <div class="card">
    <div class="card-title">الأجهزة</div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-num">12</div><div class="stat-label">الأجهزة</div></div>
      <div class="stat-box"><div class="stat-num red">2</div><div class="stat-label">أعطال</div></div>
      <div class="stat-box"><div class="stat-num">45</div><div class="stat-label">التحاليل</div></div>
    </div>
  </div>
</div>

<!-- شريط أسفل -->
<div class="bottom-nav">
  <button class="nav-btn active"><span class="nav-icon">🏠</span>الرئيسية</button>
  <button class="nav-btn"><span class="nav-icon">🧪</span>المحاليل</button>
  <button class="nav-btn"><span class="nav-icon">📄</span>التقارير</button>
  <button class="nav-btn"><span class="nav-icon">⚙️</span>الإعدادات</button>
</div>

<!-- النماذج -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">نموذج <button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body"></div>
  </div>
</div>

<!-- النتائج -->
<div class="result-box" id="resultBox">
  <pre id="result"></pre>
</div>

<script>
let ANALYSIS_DEVICES = {
  "c311": {name:"Cobas c311"},
  "pureC303": {name:"Cobas Pure C303"},
  "pureE402": {name:"COBAS PURE e402"},
  "dimEXL200": {name:"Dimension EXL 200"},
  "cobasE411": {name:"Cobas e411"},
  "miniVidas": {name:"mini vidas"}
};
let testStatus = {c311:{},pureC303:{},pureE402:{},dimEXL200:{},cobasE411:{},miniVidas:{}};
let SUPPLY_DEVICES = {};
let supplyData = {};
let REPORT_INFO = {name:"مختبر المدينة",facility:"قسم التحاليل المتقدمة"};

function closeModal(){document.getElementById("modalOverlay").classList.remove("open");}
function closeReportModalDirect(){closeModal();}

function getDevTests(dev){return ["Test1","Test2","Test3","Test4","Test5"];}

function getStatus(i){return {status:"ok",reasons:[]};}

function printReport(){
  closeReportModalDirect();
  var inclCoverage=document.getElementById("rOptCoverage")?.checked;
  var inclAlerts=document.getElementById("rOptAlerts")?.checked;
  var inclInfo=document.getElementById("rOptInfo")?.checked;

  var now=new Date();
  var dateStr=now.toLocaleDateString("ar-SA");
  var timeStr=now.toLocaleTimeString("ar-SA");

  var html = `
  <html dir="rtl">
  <head>
  <meta charset="UTF-8">
  <title>تقرير المختبر</title>
  <style>
  body{font-family:Arial;padding:20px}
  .box{border:1px solid #000;margin-bottom:10px;padding:10px}
  </style>
  </head>
  <body>
  <h2>📋 تقرير المختبر</h2>
  <p>${dateStr} - ${timeStr}</p>
  `;
  if(inclCoverage){
    html += "<h3>تغطية الأجهزة</h3>";
    for(var d in ANALYSIS_DEVICES){
      var tests=getDevTests(d);
      var av=tests.filter(t=>testStatus[d][t]==="yes").length;
      html += `<div class="box">${ANALYSIS_DEVICES[d].name}: ${av}/${tests.length}</div>`;
    }
  }
  if(inclAlerts){
    html += "<h3>التنبيهات</h3>";
    for(var d in SUPPLY_DEVICES){
      (supplyData[d]||[]).forEach(function(i){
        var s=getStatus(i);
        if(s.status!=="ok"){
          html += `<div class="box">${i.name} - ${s.reasons.join(", ")}</div>`;
        }
      });
    }
  }
  if(inclInfo){
    html += `<h3>المعلومات</h3><div class="box">${REPORT_INFO.name}<br>${REPORT_INFO.facility}</div>`;
  }
  html += "</body></html>";

  var w=window.open();
  w.document.write(html);
  w.document.close();
  w.print();
}
</script>
</body>
</html>
