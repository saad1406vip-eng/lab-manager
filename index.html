<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1b2a">
<title>Lab Manager Pro</title>

<link rel="manifest" href="manifest.json">

<style>
body{font-family:Arial;background:#0d1b2a;color:#fff;margin:0;padding:0}
header{padding:15px;background:#112236;text-align:center;font-weight:bold}
button{padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer}
.card{background:#1a3352;margin:10px;padding:10px;border-radius:10px}
</style>
</head>

<body>

<header>Lab Manager Pro</header>

<div class="card">
<button onclick="addItem()">➕ إضافة مادة</button>
<button onclick="analyze()">📊 تحليل</button>
<button onclick="printReport()">🖨️ طباعة</button>
</div>

<div class="card">
<pre id="output"></pre>
</div>

<script>

// بيانات
var data = JSON.parse(localStorage.getItem("labData") || "[]");

// إضافة مادة
function addItem(){
  var name = prompt("اسم المادة:");
  if(!name) return;

  var qty = prompt("الكمية:");
  var expiry = prompt("تاريخ الانتهاء (YYYY-MM-DD):");

  data.push({name, qty:Number(qty)||0, expiry});
  save();
  show("تمت الإضافة ✓");
}

// حفظ
function save(){
  localStorage.setItem("labData", JSON.stringify(data));
}

// تحليل
function analyze(){
  var today = new Date();
  var report = "📊 تقرير:\n\n";

  data.forEach(i=>{
    var exp = new Date(i.expiry);
    var diff = Math.floor((exp - today)/86400000);

    if(diff < 0){
      report += "❌ " + i.name + " منتهي\n";
    } else if(diff < 30){
      report += "⚠️ " + i.name + " قريب ينتهي ("+diff+" يوم)\n";
    } else {
      report += "✅ " + i.name + "\n";
    }
  });

  show(report);
}

// عرض
function show(t){
  document.getElementById("output").textContent = t;
}

// طباعة
function printReport(){
  var w = window.open("");
  w.document.write("<pre>"+document.getElementById("output").textContent+"</pre>");
  w.print();
}

</script>

</body>
</html>
