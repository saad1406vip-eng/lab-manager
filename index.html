<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0d1b2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lab Manager">
<title>Lab Manager Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1b2a;
  --bg2: #112236;
  --bg3: #162d46;
  --card: #1a3352;
  --border: #1e3f63;
  --accent: #00c8ff;
  --accent2: #00ff9d;
  --accent3: #ff6b6b;
  --text: #e8f4fd;
  --text2: #7aa8cc;
  --text3: #4a7a9b;
  --yes: #00ff9d;
  --no: #ff6b6b;
  --font: 'IBM Plex Sans Arabic', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --radius: 10px;
  --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  direction: rtl;
  font-size: 14px;
  line-height: 1.5;
  overflow-x: hidden;
}
header {
  background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 800px;
  margin: 0 auto;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo-area { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  font-size: 26px;
  color: var(--accent);
  filter: drop-shadow(0 0 8px var(--accent));
}
h1 { font-size: 16px; font-weight: 700; color: var(--text); }
.subtitle { font-size: 11px; color: var(--text3); }
.btn-icon {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text2);
  width: 36px; height: 36px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.btn-icon:hover { color: var(--accent); border-color: var(--accent); }
main {
  max-width: 800px;
  margin: 0 auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.dashboard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.dash-title {
  font-size: 11px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 14px;
}
.coverage-bars { display: flex; flex-direction: column; gap: 8px; }
.coverage-row {
  display: grid;
  grid-template-columns: 110px 1fr 40px;
  align-items: center;
  gap: 10px;
}
.cov-label {
  font-size: 11px; color: var(--text2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-family: var(--mono);
}
.cov-track {
  height: 6px; background: var(--bg2);
  border-radius: 3px; overflow: hidden;
}
.cov-fill {
  height: 100%; border-radius: 3px;
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  background: linear-gradient(90deg, var(--accent2), var(--accent));
}
.cov-pct { font-size: 11px; font-family: var(--mono); color: var(--accent); text-align: left; }
.devices-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.tab-nav {
  display: flex; overflow-x: auto;
  border-bottom: 1px solid var(--border);
  scrollbar-width: none; background: var(--bg2);
}
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0; background: none; border: none;
  color: var(--text3); padding: 12px 14px; cursor: pointer;
  font-family: var(--font); font-size: 12px; font-weight: 500;
  border-bottom: 2px solid transparent; transition: all 0.2s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text2); }
.tab-btn.active {
  color: var(--accent); border-bottom-color: var(--accent);
  background: rgba(0,200,255,0.05);
}
.tab { display: none; padding: 16px; animation: fadeIn 0.2s ease; }
.tab.active { display: block; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.tab-header {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 12px;
}
.tab-title { font-size: 13px; font-weight: 600; color: var(--text); }
.tab-stats { font-size: 11px; font-family: var(--mono); color: var(--text3); }
.tab-stats span { color: var(--accent2); font-weight: 600; }
.cat-header {
  font-size: 10px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 1.5px;
  padding: 10px 0 6px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 6px; margin-top: 12px;
}
.cat-header:first-of-type { margin-top: 0; }
.tests-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 6px;
}
.test-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer; transition: all 0.15s;
  user-select: none; -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
}
.test-item.available {
  border-color: rgba(0,255,157,0.3);
  background: rgba(0,255,157,0.05);
}
.test-item.unavailable {
  border-color: rgba(255,107,107,0.2);
  background: rgba(255,107,107,0.03);
  opacity: 0.65;
}
.test-name { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--text); }
.test-badge {
  font-size: 10px; padding: 2px 7px;
  border-radius: 10px; font-weight: 700; transition: all 0.15s;
}
.test-item.available .test-badge { background: rgba(0,255,157,0.15); color: var(--yes); }
.test-item.unavailable .test-badge { background: rgba(255,107,107,0.15); color: var(--no); }
.bulk-actions { display: flex; gap: 8px; margin-bottom: 12px; }
.btn-bulk {
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text2); padding: 5px 12px;
  border-radius: var(--radius-sm); cursor: pointer;
  font-family: var(--font); font-size: 11px; transition: all 0.15s;
}
.btn-bulk:hover { border-color: var(--accent); color: var(--accent); }
.analysis-section {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
}
.section-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 14px; }
.action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #0095cc);
  border: none; color: #000; padding: 10px 18px;
  border-radius: var(--radius-sm); cursor: pointer;
  font-family: var(--font); font-size: 13px; font-weight: 700;
  transition: all 0.2s; box-shadow: 0 0 16px rgba(0,200,255,0.3);
}
.btn-primary:hover { box-shadow: 0 0 24px rgba(0,200,255,0.5); }
.btn-secondary {
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text2); padding: 10px 16px;
  border-radius: var(--radius-sm); cursor: pointer;
  font-family: var(--font); font-size: 13px; transition: all 0.2s;
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
#resultWrapper {
  border-top: 1px solid var(--border);
  padding-top: 14px; margin-top: 4px;
  animation: fadeIn 0.3s ease;
}
pre#result {
  font-family: var(--font); font-size: 13px;
  line-height: 1.8; color: var(--text);
  white-space: pre-wrap; word-break: break-word;
}
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--accent2); color: #000;
  padding: 10px 20px; border-radius: 20px;
  font-weight: 600; font-size: 13px; z-index: 999;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
@media (max-width: 480px) {
  .coverage-row { grid-template-columns: 90px 1fr 36px; }
  .tests-grid { grid-template-columns: repeat(2, 1fr); }
  .tab-btn { padding: 10px 11px; font-size: 11px; }
}
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo-area">
      <span class="logo-icon">⬡</span>
      <div>
        <h1>Lab Manager Pro</h1>
        <p class="subtitle">نظام تحليل تغطية الأجهزة</p>
      </div>
    </div>
    <button class="btn-icon" onclick="resetAll()" title="إعادة ضبط">↺</button>
  </div>
</header>
<main>
  <section class="dashboard">
    <div class="dash-title">التغطية الحالية</div>
    <div class="coverage-bars" id="coverageBars"></div>
  </section>
  <section class="devices-section">
    <div class="tab-nav" id="tabNav"></div>
    <div id="tabsContainer"></div>
  </section>
  <section class="analysis-section">
    <div class="section-title">🔍 التحليل الذكي</div>
    <div class="action-row">
      <button class="btn-primary" onclick="analyze()">تحليل الوضع</button>
      <button class="btn-secondary" onclick="generateReport()">تقرير كامل</button>
      <button class="btn-secondary" onclick="copyReport()">نسخ التقرير</button>
    </div>
    <div id="resultWrapper" style="display:none">
      <pre id="result"></pre>
    </div>
  </section>
</main>
<div class="toast" id="toast"></div>
<script>
var TEST_CATEGORIES = {
  "الكيمياء العامة": ["GLU","UREA","CREA","NA","K","CL","CO2","CA","PHOS","MG"],
  "إنزيمات الكبد والعضلات": ["ALT","AST","ALP","GGT","LDH","CK","CKMB"],
  "الدهنيات": ["CHOL","HDL","LDL","TRIG"],
  "البروتينات": ["TP","ALB","TBIL","DBIL"],
  "مؤشرات أخرى": ["IRON","URIC","CRP","FERRITIN","B12"],
  "الهرمونات والغدة الدرقية": ["TSH","FT3","FT4","T3","T4","LH","FSH","PROLACTIN","CORTISOL"],
  "هرمونات التكاثر والسكري": ["TESTO","E2","PROG","INSULIN","HBA1C"],
  "الطوارئ والأورام": ["TROPONIN","BHCG","AFP","PSA","CA125","CA199"]
};
var DEVICE_NAMES = {
  atellica:"Siemens Atellica", c311:"Cobas c311", c303:"Cobas Pure C303",
  e402:"Cobas Pure e402", dimension:"Dimension EXL 200", e411:"Cobas e411", vidas:"Mini VIDAS"
};
var DEVICE_DEFAULTS = {
  atellica: {GLU:"yes",UREA:"yes",CREA:"yes",NA:"yes",K:"yes",CL:"yes",CO2:"yes",CA:"yes",PHOS:"yes",MG:"yes",ALT:"yes",AST:"yes",ALP:"yes",GGT:"yes",LDH:"yes",CK:"yes",CKMB:"yes",CHOL:"yes",HDL:"yes",LDL:"yes",TRIG:"yes",TP:"yes",ALB:"yes",TBIL:"yes",DBIL:"yes",IRON:"yes",URIC:"yes",CRP:"yes",FERRITIN:"yes",B12:"yes",TSH:"yes",FT3:"yes",FT4:"yes",T3:"no",T4:"no",LH:"yes",FSH:"yes",PROLACTIN:"yes",CORTISOL:"yes",TESTO:"yes",E2:"yes",PROG:"yes",INSULIN:"yes",HBA1C:"yes",TROPONIN:"yes",BHCG:"yes",AFP:"yes",PSA:"yes",CA125:"yes",CA199:"yes"},
  c311: {GLU:"yes",UREA:"yes",CREA:"yes",NA:"yes",K:"yes",CL:"yes",CO2:"yes",CA:"yes",PHOS:"yes",MG:"yes",ALT:"yes",AST:"yes",ALP:"yes",GGT:"yes",LDH:"yes",CK:"yes",CKMB:"yes",CHOL:"yes",HDL:"yes",LDL:"yes",TRIG:"yes",TP:"yes",ALB:"yes",TBIL:"yes",DBIL:"yes",IRON:"yes",URIC:"yes",CRP:"yes",FERRITIN:"no",B12:"no",TSH:"no",FT3:"no",FT4:"no",T3:"no",T4:"no",LH:"no",FSH:"no",PROLACTIN:"no",CORTISOL:"no",TESTO:"no",E2:"no",PROG:"no",INSULIN:"no",HBA1C:"yes",TROPONIN:"no",BHCG:"no",AFP:"no",PSA:"no",CA125:"no",CA199:"no"},
  c303: {GLU:"yes",UREA:"yes",CREA:"yes",NA:"yes",K:"yes",CL:"yes",CO2:"yes",CA:"yes",PHOS:"yes",MG:"yes",ALT:"yes",AST:"yes",ALP:"yes",GGT:"yes",LDH:"yes",CK:"yes",CKMB:"yes",CHOL:"yes",HDL:"yes",LDL:"yes",TRIG:"yes",TP:"yes",ALB:"yes",TBIL:"yes",DBIL:"yes",IRON:"yes",URIC:"yes",CRP:"yes",FERRITIN:"no",B12:"no",TSH:"no",FT3:"no",FT4:"no",T3:"no",T4:"no",LH:"no",FSH:"no",PROLACTIN:"no",CORTISOL:"no",TESTO:"no",E2:"no",PROG:"no",INSULIN:"no",HBA1C:"yes",TROPONIN:"no",BHCG:"no",AFP:"no",PSA:"no",CA125:"no",CA199:"no"},
  e402: {GLU:"no",UREA:"no",CREA:"no",NA:"no",K:"no",CL:"no",CO2:"no",CA:"no",PHOS:"no",MG:"no",ALT:"no",AST:"no",ALP:"no",GGT:"no",LDH:"no",CK:"no",CKMB:"no",CHOL:"no",HDL:"no",LDL:"no",TRIG:"no",TP:"no",ALB:"no",TBIL:"no",DBIL:"no",IRON:"yes",URIC:"no",CRP:"no",FERRITIN:"yes",B12:"yes",TSH:"yes",FT3:"yes",FT4:"yes",T3:"yes",T4:"yes",LH:"yes",FSH:"yes",PROLACTIN:"yes",CORTISOL:"yes",TESTO:"yes",E2:"yes",PROG:"yes",INSULIN:"yes",HBA1C:"no",TROPONIN:"yes",BHCG:"yes",AFP:"yes",PSA:"yes",CA125:"yes",CA199:"yes"},
  dimension: {GLU:"yes",UREA:"yes",CREA:"yes",NA:"yes",K:"yes",CL:"yes",CO2:"yes",CA:"yes",PHOS:"yes",MG:"yes",ALT:"yes",AST:"yes",ALP:"yes",GGT:"yes",LDH:"yes",CK:"yes",CKMB:"yes",CHOL:"yes",HDL:"yes",LDL:"yes",TRIG:"yes",TP:"yes",ALB:"yes",TBIL:"yes",DBIL:"yes",IRON:"yes",URIC:"yes",CRP:"yes",FERRITIN:"yes",B12:"no",TSH:"yes",FT3:"yes",FT4:"yes",T3:"no",T4:"no",LH:"yes",FSH:"yes",PROLACTIN:"yes",CORTISOL:"yes",TESTO:"yes",E2:"yes",PROG:"yes",INSULIN:"yes",HBA1C:"yes",TROPONIN:"yes",BHCG:"yes",AFP:"no",PSA:"yes",CA125:"no",CA199:"no"},
  e411: {GLU:"no",UREA:"no",CREA:"no",NA:"no",K:"no",CL:"no",CO2:"no",CA:"no",PHOS:"no",MG:"no",ALT:"no",AST:"no",ALP:"no",GGT:"no",LDH:"no",CK:"no",CKMB:"no",CHOL:"no",HDL:"no",LDL:"no",TRIG:"no",TP:"no",ALB:"no",TBIL:"no",DBIL:"no",IRON:"yes",URIC:"no",CRP:"no",FERRITIN:"yes",B12:"yes",TSH:"yes",FT3:"yes",FT4:"yes",T3:"yes",T4:"yes",LH:"yes",FSH:"yes",PROLACTIN:"yes",CORTISOL:"yes",TESTO:"yes",E2:"yes",PROG:"yes",INSULIN:"yes",HBA1C:"no",TROPONIN:"yes",BHCG:"yes",AFP:"yes",PSA:"yes",CA125:"yes",CA199:"yes"},
  vidas: {GLU:"no",UREA:"no",CREA:"no",NA:"no",K:"no",CL:"no",CO2:"no",CA:"no",PHOS:"no",MG:"no",ALT:"no",AST:"no",ALP:"no",GGT:"no",LDH:"no",CK:"no",CKMB:"no",CHOL:"no",HDL:"no",LDL:"no",TRIG:"no",TP:"no",ALB:"no",TBIL:"no",DBIL:"no",IRON:"no",URIC:"no",CRP:"no",FERRITIN:"no",B12:"no",TSH:"yes",FT3:"yes",FT4:"yes",T3:"no",T4:"no",LH:"no",FSH:"no",PROLACTIN:"no",CORTISOL:"no",TESTO:"no",E2:"no",PROG:"yes",INSULIN:"no",HBA1C:"no",TROPONIN:"yes",BHCG:"yes",AFP:"no",PSA:"no",CA125:"no",CA199:"no"}
};
var ALL_TESTS = [];
for (var cat in TEST_CATEGORIES) { ALL_TESTS = ALL_TESTS.concat(TEST_CATEGORIES[cat]); }
var devices = {};
function init() {
  var saved = loadData();
  for (var d in DEVICE_DEFAULTS) {
    devices[d] = {};
    for (var i = 0; i < ALL_TESTS.length; i++) {
      var t = ALL_TESTS[i];
      devices[d][t] = (saved && saved[d] && saved[d][t] !== undefined) ? saved[d][t] : (DEVICE_DEFAULTS[d][t] || "no");
    }
  }
  buildTabs();
  updateDashboard();
}
function buildTabs() {
  var tabNav = document.getElementById("tabNav");
  var container = document.getElementById("tabsContainer");
  tabNav.innerHTML = ""; container.innerHTML = "";
  var shorts = {atellica:"Atellica",c311:"c311",c303:"C303",e402:"e402",dimension:"EXL200",e411:"e411",vidas:"VIDAS"};
  Object.keys(DEVICE_NAMES).forEach(function(d, index) {
    var btn = document.createElement("button");
    btn.className = "tab-btn" + (index===0?" active":"");
    btn.textContent = shorts[d]||d;
    btn.setAttribute("onclick","showTab('"+d+"')");
    btn.id = "btn-"+d;
    tabNav.appendChild(btn);
    var tab = document.createElement("div");
    tab.id = "tab-"+d;
    tab.className = "tab"+(index===0?" active":"");
    var html = '<div class="tab-header"><div class="tab-title">'+DEVICE_NAMES[d]+'</div><div class="tab-stats" id="stats-'+d+'"></div></div>';
    html += '<div class="bulk-actions"><button class="btn-bulk" onclick="setAll(\''+d+'\',\'yes\')">تفعيل الكل ✓</button><button class="btn-bulk" onclick="setAll(\''+d+'\',\'no\')">إلغاء الكل ✗</button></div>';
    for (var cat in TEST_CATEGORIES) {
      html += '<div class="cat-header">'+cat+'</div><div class="tests-grid">';
      TEST_CATEGORIES[cat].forEach(function(t) {
        var val = devices[d][t]||"no";
        html += '<div class="test-item '+(val==="yes"?"available":"unavailable")+'" id="item-'+d+'-'+t+'" onclick="toggle(\''+d+'\',\''+t+'\')"><span class="test-name">'+t+'</span><span class="test-badge">'+(val==="yes"?"✓":"✗")+'</span></div>';
      });
      html += '</div>';
    }
    tab.innerHTML = html;
    container.appendChild(tab);
    updateTabStats(d);
  });
}
function toggle(device,test) {
  devices[device][test] = devices[device][test]==="yes"?"no":"yes";
  saveData(); refreshTestItem(device,test); updateTabStats(device); updateDashboard();
}
function refreshTestItem(device,test) {
  var el = document.getElementById("item-"+device+"-"+test);
  if(!el) return;
  var val = devices[device][test];
  el.className = "test-item "+(val==="yes"?"available":"unavailable");
  el.querySelector(".test-badge").textContent = val==="yes"?"✓":"✗";
}
function setAll(device,value) {
  for(var i=0;i<ALL_TESTS.length;i++) devices[device][ALL_TESTS[i]]=value;
  saveData();
  ALL_TESTS.forEach(function(t){refreshTestItem(device,t);});
  updateTabStats(device); updateDashboard();
}
function updateTabStats(device) {
  var el = document.getElementById("stats-"+device);
  if(!el) return;
  var avail = ALL_TESTS.filter(function(t){return devices[device][t]==="yes";}).length;
  el.innerHTML = "<span>"+avail+"</span> / "+ALL_TESTS.length;
}
function showTab(id) {
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active");});
  document.querySelectorAll(".tab-btn").forEach(function(b){b.classList.remove("active");});
  var tab=document.getElementById("tab-"+id); var btn=document.getElementById("btn-"+id);
  if(tab) tab.classList.add("active"); if(btn) btn.classList.add("active");
}
function updateDashboard() {
  var bars=document.getElementById("coverageBars"); var total=ALL_TESTS.length;
  var shorts={atellica:"Atellica",c311:"c311",c303:"C303",e402:"e402",dimension:"EXL200",e411:"e411",vidas:"VIDAS"};
  var rows=Object.keys(DEVICE_NAMES).map(function(d){
    var avail=ALL_TESTS.filter(function(t){return devices[d][t]==="yes";}).length;
    return {d:d,avail:avail,pct:Math.round(avail/total*100)};
  });
  rows.sort(function(a,b){return b.pct-a.pct;});
  bars.innerHTML=rows.map(function(r){
    return '<div class="coverage-row"><div class="cov-label">'+(shorts[r.d]||r.d)+'</div><div class="cov-track"><div class="cov-fill" style="width:'+r.pct+'%"></div></div><div class="cov-pct">'+r.pct+'%</div></div>';
  }).join("");
}
function analyze() {
  var total=ALL_TESTS.length;
  var ranked=Object.keys(DEVICE_NAMES).map(function(d){
    var avail=ALL_TESTS.filter(function(t){return devices[d][t]==="yes";}).length;
    return {d:d,avail:avail,pct:Math.round(avail/total*100)};
  });
  ranked.sort(function(a,b){return b.avail-a.avail;});
  var set1=[...new Set(ALL_TESTS.filter(function(t){return devices[ranked[0].d][t]==="yes";}))];
  var set12=[...new Set(ALL_TESTS.filter(function(t){return devices[ranked[0].d][t]==="yes"||devices[ranked[1].d][t]==="yes";}))];
  var set123=[...new Set(ALL_TESTS.filter(function(t){return devices[ranked[0].d][t]==="yes"||devices[ranked[1].d][t]==="yes"||devices[ranked[2].d][t]==="yes";}))];
  var exclusiveByDevice={};
  for(var d in devices){
    exclusiveByDevice[d]=ALL_TESTS.filter(function(t){
      if(devices[d][t]!=="yes") return false;
      return Object.keys(devices).filter(function(dd){return dd!==d;}).every(function(dd){return devices[dd][t]!=="yes";});
    });
  }
  var uncovered=ALL_TESTS.filter(function(t){return Object.keys(devices).every(function(d){return devices[d][t]!=="yes";});});
  var medals=["🥇","🥈","🥉","4️⃣","5️⃣","6️⃣","7️⃣"];
  var shorts={atellica:"Atellica",c311:"c311",c303:"C303",e402:"e402",dimension:"EXL200",e411:"e411",vidas:"VIDAS"};
  var result="══════════════════════════\n📊 التحليل الذكي\n══════════════════════════\n\n🏆 ترتيب الأجهزة:\n──────────────────────────\n";
  ranked.forEach(function(r,i){
    result+=(medals[i]||(i+1)+".")+" "+DEVICE_NAMES[r.d]+"\n   "+r.avail+"/"+total+" اختبار ("+r.pct+"%)\n";
    if(exclusiveByDevice[r.d]&&exclusiveByDevice[r.d].length>0) result+="   ✦ حصري: "+exclusiveByDevice[r.d].join(", ")+"\n";
    result+="\n";
  });
  result+="📈 التغطية التراكمية:\n──────────────────────────\n";
  result+="• "+shorts[ranked[0].d]+" وحده:\n  "+set1.length+"/"+total+" ("+Math.round(set1.length/total*100)+"%)\n\n";
  result+="• + "+shorts[ranked[1].d]+":\n  "+set12.length+"/"+total+" ("+Math.round(set12.length/total*100)+"%)\n\n";
  result+="• + "+shorts[ranked[2].d]+":\n  "+set123.length+"/"+total+" ("+Math.round(set123.length/total*100)+"%)\n\n";
  result+="⚡ توصيات خاصة:\n──────────────────────────\n";
  if(devices.vidas["TROPONIN"]==="yes") result+="• Troponin → Mini VIDAS (طوارئ)\n";
  if(devices.vidas["BHCG"]==="yes") result+="• Beta-hCG → Mini VIDAS\n";
  if(devices.vidas["PROG"]==="yes") result+="• Progesterone → Mini VIDAS\n";
  result+="\n";
  if(uncovered.length>0) result+="⚠️ غير مغطاة ("+uncovered.length+"):\n──────────────────────────\n"+uncovered.join(", ")+"\n";
  else result+="✅ جميع الاختبارات مغطاة\n";
  showResult(result);
}
function generateReport() {
  var now=new Date();
  var dateStr=now.toLocaleDateString("ar-SA",{year:"numeric",month:"long",day:"numeric"});
  var report="══════════════════════════\n📋 تقرير المختبر الكامل\n📅 "+dateStr+"\n══════════════════════════\n\n";
  for(var d in DEVICE_NAMES){
    var avail=ALL_TESTS.filter(function(t){return devices[d][t]==="yes";});
    var missing=ALL_TESTS.filter(function(t){return devices[d][t]==="no";});
    var pct=Math.round(avail.length/ALL_TESTS.length*100);
    report+="🔹 "+DEVICE_NAMES[d]+" ("+pct+"%)\n✅ متوفر ("+avail.length+"):\n   "+(avail.length>0?avail.join(", "):"—")+"\n❌ غير متوفر ("+missing.length+"):\n   "+(missing.length>0?missing.join(", "):"—")+"\n\n";
  }
  showResult(report);
}
function copyReport() {
  var text=document.getElementById("result").textContent;
  if(!text.trim()){showToast("لا يوجد تقرير — اضغط تحليل أولاً");return;}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){showToast("✓ تم النسخ");}).catch(function(){fallbackCopy(text);});
  } else { fallbackCopy(text); }
}
function fallbackCopy(text) {
  var ta=document.createElement("textarea"); ta.value=text;
  ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select();
  try{document.execCommand("copy");showToast("✓ تم النسخ");}catch(e){showToast("لم يتمكن من النسخ");}
  document.body.removeChild(ta);
}
function showResult(text) {
  document.getElementById("result").textContent=text;
  var wrapper=document.getElementById("resultWrapper");
  wrapper.style.display="block";
  setTimeout(function(){wrapper.scrollIntoView({behavior:"smooth",block:"nearest"});},100);
}
function showToast(msg) {
  var toast=document.getElementById("toast");
  toast.textContent=msg; toast.classList.add("show");
  setTimeout(function(){toast.classList.remove("show");},2500);
}
function saveData(){try{localStorage.setItem("labManagerPro_v2",JSON.stringify(devices));}catch(e){}}
function loadData(){try{var raw=localStorage.getItem("labManagerPro_v2");return raw?JSON.parse(raw):null;}catch(e){return null;}}
function resetAll(){if(!confirm("إعادة ضبط كل الإعدادات للافتراضي؟"))return;try{localStorage.removeItem("labManagerPro_v2");}catch(e){}init();showToast("تم إعادة الضبط");}
init();
</script>
